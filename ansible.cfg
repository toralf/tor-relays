[defaults]
# mandatory for a Debian release upgrade (e.g. bookworm -> trixie)
interpreter_python = /usr/bin/python3

inventory = ./inventory

# mainly limited by Tx, but CPU too
forks = 48
pipelining = true
# https://github.com/ansible/ansible/issues/77325
strategy = free

# caching is suddenly broken
# fact_caching = jsonfile
# fact_caching_connection = ./.ansible_facts
gathering = smart
inject_facts_as_vars = false

# avoid having "become: true" nearly everywhere
remote_user = root

# overwrite by: ANSIBLE_DISPLAY_OK_HOSTS=true
display_ok_hosts = false

# overwrite by: ANSIBLE_DISPLAY_SKIPPED_HOSTS=true
display_skipped_hosts = false

# no log, b/c it fools certain attempts to grep the system log
no_target_syslog = true

# https://github.com/ansible-collections/ansible.posix/issues/686
deprecation_warnings = false

[ssh_connection]
# compression gives higher Tx over an ADSL line
ssh_args = -4 -o ForwardAgent=no -o ForwardX11=no -o StrictHostKeyChecking=yes -o Compression=yes -o ControlMaster=auto -o ControlPersist=120s -o GSSAPIAuthentication=no -o IdentitiesOnly=yes -o ServerAliveInterval=60s

retries = 2
