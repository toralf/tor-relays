---
# reload before restart: https://gitlab.torproject.org/tpo/core/tor/-/issues/41189

- name: Reload Tor
  listen: Reload Tor
  ansible.builtin.systemd_service:
    name: tor
    state: reloaded
    enabled: true

- name: Restart Tor
  listen: Restart Tor
  ansible.builtin.systemd_service:
    name: tor
    state: restarted
    enabled: true
    daemon_reload: true
