---
- name: Main
  when: tor_port > 0
  module_defaults:
    ansible.builtin.apt:
      allow_change_held_packages: true
      autoclean: true
      autoremove: true
      purge: true
      state: latest
    ansible.builtin.copy:
      owner: root
      group: root
      mode: "0644"
    ansible.builtin.file:
      owner: root
      group: root
      mode: "0644"
    ansible.builtin.get_url:
      mode: "0744"
      force: true
    ansible.builtin.lineinfile:
      create: true
      firstmatch: true
      owner: root
      group: root
      mode: "0644"
    ansible.builtin.stat:
      get_attributes: false
      get_checksum: false
      get_mime: false
    ansible.builtin.template:
      owner: root
      group: root
      mode: "0644"
  block:
    - name: Validate
      ansible.builtin.import_tasks: validate.yaml
      tags:
        - validate

    - name: Test for existance of Tor keys
      when: tor_identity_restore
      ansible.builtin.stat:
        path: /var/lib/tor/keys/
      register: _keys
      tags:
        - tor-identity-restore

    - name: Install apt package
      when: not tor_build_from_source
      ansible.builtin.import_tasks: tor-apt.yaml
      tags:
        - tor

    - name: Build from source
      when: tor_build_from_source
      block:
        - name: Tools
          when: ansible_facts.os_family == 'Debian'
          ansible.builtin.import_tasks: tools.yaml
          tags:
            - tools

        - name: Tor
          ansible.builtin.import_tasks: tor-src.yaml
          tags:
            - tor

        - name: Lyrebird
          when: tor_bridge_distribution | length > 0
          ansible.builtin.import_tasks: lyrebird.yaml
          tags:
            - lyrebird

    - name: Tor identity restore
      when: tor_identity_restore and not _keys.stat.exists
      ansible.builtin.import_tasks: tor-identity-restore.yaml
      tags:
        - tor-identity-restore

    - name: Config
      ansible.builtin.import_tasks: config.yaml
      tags:
        - config

    - name: Geoip
      ansible.builtin.import_tasks: geoip.yaml
      tags:
        - geoip

    - name: DDoS metrics
      when: ddos_metrics
      ansible.builtin.import_tasks: ddos-metrics.yaml
      tags:
        - ddos-metrics

    - name: Watchdog
      when: tor_bridge_distribution | length == 0
      ansible.builtin.import_tasks: watchdog.yaml
      tags:
        - watchdog

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers
      tags:
        - flush
