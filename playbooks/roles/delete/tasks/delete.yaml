---
- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Instance
  delegate_to: localhost
  throttle: "{{ concurrent_local_jobs }}"
  changed_when: true
  failed_when: false
  ansible.builtin.command:
    cmd: >-
      hcloud --quiet --poll-interval 10s server delete {{ inventory_hostname }}

- name: SSH known key
  delegate_to: localhost
  throttle: 1
  changed_when: _result_sshkey.stdout is not search('not found in')
  ansible.builtin.command:
    cmd: >-
      ssh-keygen -R {{ inventory_hostname }}
  register: _result_sshkey
