---
- name: Configure apt
  ansible.builtin.copy:
    src: 99local-apt-conf
    dest: /etc/apt/apt.conf.d/

- name: Stop and disable unattended upgrade
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer
    - unattended-upgrades

- name: Allow phased updates in Ubuntu
  when: ansible_facts.distribution == 'Ubuntu'
  ansible.builtin.copy:
    src: 20phased-updates
    dest: /etc/apt/apt.conf.d/

- name: Enable Debian backports at IONOS
  when: ansible_facts.system_vendor == 'QEMU' and ansible_facts.distribution == 'Debian'
  vars:
    _rel: "{{ ansible_facts.distribution_release }}"
  ansible.builtin.lineinfile:
    line: "Suites: {{ _rel }} {{ _rel }}-updates {{ _rel }}-backports"
    path: /etc/apt/sources.list.d/debian.sources
    regexp: "^Suites: {{ _rel }} {{ _rel }}-updates$"

- name: Update apt cache
  changed_when: _result_apt_cache.cache_updated
  ansible.builtin.apt:
    cache_valid_time: 3600
    update_cache: true
  register: _result_apt_cache

- name: Install/Update Ansible deps
  ansible.builtin.apt:
    name:
      - python3-psutil

- name: Ensure apt is not running
  failed_when: _processes.pids | default([]) | length > 0
  retries: 2
  delay: 60
  community.general.pids:
    pattern: apt|dpkg
  register: _processes

- name: Install/Update tools
  ansible.builtin.apt:
    name:
      - cron
      - curl
      - elfutils
      - git
      - localepurge
      - needrestart
      - psmisc
      - rsync
      - sysstat

- name: Purge locale
  changed_when: _purged.stdout | length > 0
  ansible.builtin.command:
    cmd: >-
      localepurge
  register: _purged

- name: Microcode
  when: ansible_facts.architecture == 'x86_64'
  block:
    - name: Non-free
      when: ansible_facts.distribution_release not in ('jammy')
      block:
        - name: Non-free repo
          ansible.builtin.deb822_repository:
            name: non-free
            types:
              - deb
              - deb-src
            uris: https://deb.debian.org/debian
            suites: "{{ ansible_facts.distribution_release }}"
            components: non-free-firmware
          register: non_free_repo

        - name: Update apt cache
          when: non_free_repo.changed
          ansible.builtin.apt:
            cache_valid_time: 1
            update_cache: true
            update_cache_retries: 1

    - name: Non-free legacy repo
      when: ansible_facts.distribution_release in ('jammy')
      ansible.builtin.apt_repository:
        filename: non-free
        repo: >-
          {{ item }} http://archive.ubuntu.com/ubuntu/ {{ ansible_facts.distribution_release }} non-free-firmware
        update_cache_retries: 1
      loop:
        - deb
        - deb-src

    - name: Install/Update Microcode
      vars:
        _proc: "{{ (ansible_facts.processor[1] == 'AuthenticAMD') | ternary('amd64', 'intel') }}"
      ansible.builtin.apt:
        name:
          - "{{ _proc }}-microcode"
      notify: Reboot

- name: Install/Update additional software
  when: additional_software | length > 0
  ansible.builtin.apt:
    name: "{{ additional_software }}"
