---
- name: Gather facts - common
  ansible.builtin.setup:
    gather_subset:
      - kernel
  tags:
    - facts

- name: Validate
  ansible.builtin.import_tasks: validate.yaml
  tags:
    - validate

- name: Main
  module_defaults:
    ansible.builtin.apt:
      allow_change_held_packages: true
      autoclean: true
      autoremove: true
      purge: true
      state: latest
    ansible.builtin.copy:
      mode: "0644"
    ansible.builtin.cron:
      backup: true
    ansible.builtin.file:
      mode: "0644"
    ansible.builtin.get_url:
      mode: "0744"
      force: true
    ansible.builtin.lineinfile:
      create: true
      firstmatch: true
      mode: "0644"
    ansible.builtin.template:
      mode: "0644"
  block:
    - name: Run a custom command
      when: custom_command_file | length > 0
      ansible.builtin.import_tasks: custom-command.yaml
      tags:
        - custom-command

    - name: Base
      ansible.builtin.import_tasks: base.yaml
      tags:
        - base

    - name: Tools
      when: ansible_facts.os_family == 'Debian'
      ansible.builtin.import_tasks: basetools-apt.yaml
      tags:
        - basetools-apt

    - name: IPv6
      when: ansible_facts.distribution != 'Ubuntu' or snapshot_description is not defined
      ansible.builtin.import_tasks: ipv6.yaml
      tags:
        - ipv6

    - name: Firewall
      ansible.builtin.import_tasks: firewall.yaml
      tags:
        - firewall

    - name: System config
      ansible.builtin.import_tasks: system-config.yaml
      tags:
        - system-config

    - name: Upgrade
      when: ansible_facts.os_family == 'Debian'
      ansible.builtin.import_tasks: upgrade.yaml
      tags:
        - upgrade

    - name: Nginx
      when:
        nginx_metrics or nginx_public_site or nginx_site_directories | length > 0 or
        ddos_metrics or node_metrics or _snowflake_metrics or tor_metrics
      vars:
        _snowflake_metrics: "{{ snowflake_proxies |
          selectattr('state', 'eq', 'present') |
          selectattr('proxy_metrics_port', 'defined') |
          selectattr('proxy_metrics_port', 'gt', 0) |
          length > 0 }}"
      ansible.builtin.import_tasks: nginx.yaml
      tags:
        - nginx

    - name: Create Prometheus config files
      ansible.builtin.import_tasks: targets.yaml
      tags:
        - targets

    - name: Prometheus Node Exporter
      when: node_metrics
      ansible.builtin.import_tasks: node-exporter.yaml
      tags:
        - node-exporter

    - name: Debian kernel flavour
      when: ansible_facts.distribution == 'Debian'
      ansible.builtin.import_tasks: kernel-debian.yaml
      tags:
        - kernel-debian

    - name: Reboot
      changed_when: true
      ansible.builtin.debug:
        msg: is triggered.
      notify: Reboot
      tags:
        - never
        - force-a-reboot

    - name: Check for an advised reboot
      ansible.builtin.import_tasks: reboot.yaml
      tags:
        - reboot

    - name: Flush handlers (main)
      ansible.builtin.meta: flush_handlers
      tags:
        - flush
