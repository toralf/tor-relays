---
- name: Gather facts - IPv6
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - "!min"
      - all_ipv6_addresses

- name: Ensure IPv6 address has valid prefix
  ansible.builtin.assert:
    quiet: true
    that:
      - "ansible_facts.default_ipv6.address | length > 0"
      - "ansible_facts.default_ipv6.address is not match('fe80::')"

- name: IPv6
  when: ansible_facts.default_ipv6.address != _ipv6_new
  vars:
    _a: "{{ '%x' % (range(0, 65535) |
      random(seed=seed_address + seed_host + 'A' + _ipv6_prefix)) }}"
    _b: "{{ '%x' % (range(0, 65535) |
      random(seed=seed_address + seed_host + 'B' + _ipv6_prefix)) }}"
    _c: "{{ '%x' % (range(0, 65535) |
      random(seed=seed_address + seed_host + 'C' + _ipv6_prefix)) }}"
    _d: "{{ '%x' % (range(0, 65535) |
      random(seed=seed_address + seed_host + 'D' + _ipv6_prefix)) }}"
    _ipv6_prefix: "{{ (ansible_facts.default_ipv6.address | split(':'))[:4] | join(':') }}"
    _ipv6_new: "{{ _ipv6_prefix }}:{{ _a }}:{{ _b }}:{{ _c }}:{{ _d }}"
  block:
    - name: IPv6 change
      changed_when: true
      ansible.builtin.debug:
        msg: "{{ ansible_facts.default_ipv6.address }}  ->  {{ _ipv6_new }}"

    - name: Debian
      when: ansible_facts.distribution == 'Debian'
      block:
        - name: Change IPv6 for Debian
          ansible.builtin.lineinfile:
            line: "    address {{ _ipv6_new }}/64"
            path: /etc/network/interfaces.d/50-cloud-init
            regexp: "^    address "

        - name: Activate new IPv6 address for Debian
          ansible.builtin.systemd_service:
            name: networking
            state: restarted

    - name: Ubuntu
      when: ansible_facts.distribution == 'Ubuntu'
      block:
        # fix buggy indentation
        - name: Change IPv6 for Ubuntu Jammy
          when: ansible_facts.distribution_release == 'jammy'
          ansible.builtin.lineinfile:
            line: '              - "{{ _ipv6_new }}/64"'
            path: /etc/netplan/50-cloud-init.yaml
            regex: "            - {{ _ipv6_prefix }}:"
            mode: "0600"

        - name: Change IPv6 for Ubuntu
          when: ansible_facts.distribution_release != 'jammy'
          ansible.builtin.lineinfile:
            line: '      - "{{ _ipv6_new }}/64"'
            path: /etc/netplan/50-cloud-init.yaml
            regex: '      - "{{ _ipv6_prefix }}:'
            mode: "0600"

        - name: Activate new IPv6 address for Ubuntu
          changed_when: true
          ansible.builtin.shell:
            cmd: |-
              set -e

              netplan generate
              netplan apply

    - name: Wait till IPv6 is confirmed
      changed_when: _confirmed.rc == 123
      failed_when: _confirmed.rc not in (0, 123)
      ansible.builtin.shell:
        cmd: |-
          rc=0

          while ip -6 a | grep -q ' tentative'; do
            rc=123
            sleep 1
          done

          exit $rc
      register: _confirmed

    - name: Gather facts - IPv6 again
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "!min"
          - all_ipv6_addresses
