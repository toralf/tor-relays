---
- name: Install/Update persistent fw helper
  ansible.builtin.apt:
    name:
      - iptables-persistent

- name: Enable and start netfilter-persistent
  ansible.builtin.systemd_service:
    name: netfilter-persistent
    enabled: true
    state: started

- name: Sysctl values for base fw
  vars:
    _max: "{{ (ansible_facts.memtotal_mb < 1024) | ternary((2**16) | int, (2**18) | int) }}"
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/21firewall.conf
    sysctl_set: true
  loop:
    - name: net.core.somaxconn
      value: "{{ _max }}"
    - name: net.ipv4.tcp_max_syn_backlog
      value: "{{ _max }}"

- name: Create base fw script
  ansible.builtin.template:
    src: "firewall-ip{{ item }}.sh.j2"
    dest: "/root/firewall-ip{{ item }}.sh"
    mode: "0700"
  loop:
    - v4
    - v6
  register: _firewall_base

- name: (Re)start base firewall
  when: _firewall_base.changed
  changed_when: true
  ansible.builtin.command:
    cmd: >-
      /root/firewall-ip{{ item }}.sh start
  loop:
    - v4
    - v6

- name: Save iptables after base fw setup
  community.general.iptables_state:
    ip_version: "ip{{ item }}"
    state: saved
    path: "/etc/iptables/rules.{{ item }}"
  loop:
    - v4
    - v6
