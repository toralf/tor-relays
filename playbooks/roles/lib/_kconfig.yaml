---
- name: Gather facts - kconfig
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - "!min"
      - date_time
      - distribution
      - kernel

- name: Fetch kconfig
  throttle: "{{ concurrent_local_jobs }}"
  ansible.builtin.fetch:
    src: "/boot/config-{{ ansible_facts.kernel }}"
    dest: "{{ infodir }}/kconfig/{{ inventory_hostname }}.{{ ansible_facts.date_time.iso8601 }}.kconfig.txt"
    flat: true

- name: File kconfig info
  delegate_to: localhost
  throttle: "{{ concurrent_local_jobs }}"
  ansible.builtin.copy:
    content: |
      {{ ansible_facts.distribution }}
      {{ ansible_facts.distribution_release }}
      {{ ansible_facts.architecture }}
      {{ ansible_facts.processor[1] }}
    dest: "{{ infodir }}/kconfig/{{ inventory_hostname }}.{{ ansible_facts.date_time.iso8601 }}.info.txt"
    mode: "0644"
