---
# curl -s https://go.dev/dl/ | grep -oP 'go[1-9]+\.[0-9]+\.[0-9]+\.linux-amd64\.tar\.gz' | sort -Vr | head -n 1

- name: Go
  when: go_version | length == 0
  block:
    - name: Go repo for legacy ubuntu
      when: ansible_facts.distribution_release in ('noble')
      ansible.builtin.apt_repository:
        repo: ppa:longsleep/golang-backports
        update_cache: true

    - name: Install/Update Go
      vars:
        _backports: "{{ (ansible_facts.distribution_release == 'resolute') | ternary('', '-backports') }}"
      ansible.builtin.apt:
        default_release: "{{ ansible_facts.distribution_release }}{{ _backports }}"
        name:
          - golang-go

- name: Go upstream
  when: go_version | length > 0
  vars:
    _arch: "{{ (ansible_facts.architecture == 'x86_64') | ternary('amd64', 'arm64') }}"
    _name: "{{ go_version }}.linux-{{ _arch }}.tar.gz"
  block:
    - name: Get current Go version
      changed_when: false
      ansible.builtin.shell:
        cmd: >-
          go version | awk '{ print $3 }'
      register: __go_version_current

    - name: Go
      when: __go_version_current.stdout != go_version
      block:
        - name: Get Go
          throttle: 16
          retries: 1
          ansible.builtin.get_url:
            url: "https://go.dev/dl/{{ _name }}"
            dest: /root/
            mode: "0644"
            force: true

        - name: Install Go
          changed_when: true
          ansible.builtin.shell:
            cmd: |-
              set -eu

              sudo tar -xzf /root/{{ _name }}
              mv go {{ go_version }}
              cd ./bin
              ln -sf ../{{ go_version }}/bin/go
            chdir: /usr/local

        - name: Deinstall Go apt
          ansible.builtin.apt:
            name:
              - golang
              - golang-go
            state: absent

    - name: Cleanup Go
      changed_when: __deleted.stdout | length > 0
      ansible.builtin.shell:
        cmd: |-
          set -eu

          ls -1d /usr/local/go[1-9]*.[0-9]*.[0-9]* |
            grep -v "/usr/local/{{ go_version }}$" |
            xargs -t -r rm -r

          ls /root/go[1-9]*.[0-9]*.[0-9]*.linux-{{ _arch }}.tar.gz |
             grep -v "/root/{{ go_version }}.linux-{{ _arch }}.tar.gz$" |
             xargs -t -r rm
      register: __deleted
