---
- name: Main
  when: tor_port is defined and tor_port > 0
  module_defaults:
    ansible.builtin.lineinfile:
      create: true
      firstmatch: true
  block:
    - name: Server and public bridge
      when: tor_bridge_distribution | length == 0 or tor_bridge_distribution != 'none'
      vars:
        _fp: "{{ _result_fp.stdout_lines[0] }}"
        _fp_ed25519: "{{ _result_fp_ed25519.stdout_lines[0] }}"
        _fp_hashed: "{{ _result_fp_hashed.stdout_lines[0] }}"
      block:
        - name: Get fingerprints
          ansible.builtin.import_tasks: fingerprints.yaml
          tags:
            - bridgeline
            - bto
            - onionoo
            - wellknown

        - name: Bridge stats
          when: tor_bridge_distribution | length > 0
          ansible.builtin.import_tasks: bridge-stats.yaml
          tags:
            - bridge-stats

        - name: Bridge line
          when: tor_bridge_distribution | length > 0
          ansible.builtin.import_tasks: bridgeline.yaml
          tags:
            - never
            - bridgeline

        - name: Bto
          when: tor_bridge_distribution | length > 0
          ansible.builtin.import_tasks: bto.yaml
          tags:
            - bto

        - name: Onionoo
          when: tor_bridge_distribution | length > 0
          ansible.builtin.import_tasks: onionoo.yaml
          tags:
            - onionoo

        - name: Wellknown
          ansible.builtin.import_tasks: wellknown.yaml
          tags:
            - never
            - wellknown

    - name: Clients
      when: tor_bridge_distribution | length > 0
      ansible.builtin.import_tasks: clients.yaml
      tags:
        - clients

    - name: DDoS ipsets
      ansible.builtin.import_tasks: ddos.yaml
      tags:
        - ddos

    - name: Heartbeat
      ansible.builtin.import_tasks: heartbeat.yaml
      tags:
        - heartbeat

    - name: Log err
      ansible.builtin.import_tasks: log-err.yaml
      tags:
        - log-err

    - name: Log
      ansible.builtin.import_tasks: log-notice.yaml
      tags:
        - log-notice

    - name: Log warn
      ansible.builtin.import_tasks: log-warn.yaml
      tags:
        - log-warn

    - name: Process runtime
      ansible.builtin.import_tasks: process-runtime.yaml
      tags:
        - process-runtime

    - name: Systemd time
      ansible.builtin.import_tasks: systemd-time.yaml
      tags:
        - systemd-time

    - name: Tor identity backup
      when: tor_identity_backup
      ansible.builtin.import_tasks: tor-identity-backup.yaml
      tags:
        - tor-identity-backup

    - name: Version
      ansible.builtin.import_tasks: version.yaml
      tags:
        - version

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers
