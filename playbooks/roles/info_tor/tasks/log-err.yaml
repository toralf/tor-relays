---
- name: Check error log
  changed_when: false
  vars:
    log_err: /var/log/tor/err.log
  ansible.builtin.shell:
    cmd: |-
      grep -h -v -e 'opening .*log file.' {{ log_err }}.1 {{ log_err }} |
        tail -n 50
  register: _result_log_err

- name: Results of error log
  when: _result_log_err.stdout | length > 0
  changed_when: true
  ansible.builtin.debug:
    var: _result_log_err.stdout_lines
  notify: Not Healthy
