---
- name: Check warn log
  changed_when: false
  vars:
    log_warn: /var/log/tor/warn.log
  ansible.builtin.shell:
    cmd: |-
      grep -h -v \
        -e 'opening .*log file.' \
        -e 'Please upgrade! This version of Tor' \
        -e 'The IPv4 ORPort address 127.0.0.1 does not match' \
        -e 'Unrecognized BridgeDistribution value' \
         {{ log_warn }}.1 {{ log_warn }} |
        tail -n 10
  register: _result_log_warn

- name: Results of warn log
  when: _result_log_warn.stdout | length > 0
  changed_when: true
  ansible.builtin.debug:
    var: _result_log_warn.stdout_lines
