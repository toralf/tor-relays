---
- name: Get last lines from unattended log
  changed_when: false
  ansible.builtin.shell:
    cmd: |-
      zgrep -h -v -e 'Reading database' -e '^$' \
        /var/log/unattended-upgrades/unattended-upgrades-dpkg.log.1{,.gz} \
        /var/log/unattended-upgrades/unattended-upgrades-dpkg.log |
        tail -n 20
    executable: /bin/bash
  register: _result_unatt_log

- name: Findings of unattended log
  when: _result_unatt_log.stdout | length > 0
  changed_when: true
  ansible.builtin.debug:
    var: _result_unatt_log.stdout_lines
