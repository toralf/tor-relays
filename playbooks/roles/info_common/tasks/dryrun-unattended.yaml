---
- name: Dry run unattended-upgrade
  changed_when: false
  ansible.builtin.shell:
    cmd: |-
      unattended-upgrade --debug --dry-run |
        awk '/pkgs that look like they should be upgraded:/,/Fetched /' |
        sed -e '1d' -e '$d'
  register: _result_unatt_dryrun

- name: Output of dry run
  when: _result_unatt_dryrun.stdout | length > 0
  changed_when: true
  ansible.builtin.debug:
    var: _result_unatt_dryrun.stdout_lines
