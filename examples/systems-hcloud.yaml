---
hx:
  vars:
    go_version: "{{ (hx_repo | default('') == 'dist') | ternary('', 'go1.26.3') }}"
    hx_repos:
      mainline:
        url: https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git
        ver: master
        # tok: "{{ hx_repos_mainline_tok }}"
      stablerc:
        url: https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux-stable-rc.git
        ver: linux-7.0.y
      ltsrc:
        url: https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux-stable-rc.git
        ver: linux-6.18.y
      stable:
        url: https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git/
        ver: linux-rolling-stable
      lts:
        url: https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git/
        ver: linux-rolling-lts

    # hostname examples:  hs0-d13-arm-mainline-bp-cl-47-11  or  hm1-d13-x86
    hx_parts: "{{ inventory_hostname.split('-') }}"
    hx_repo: "{{ hx_parts[3] | default('') }}"
    additional_software:
      - libc6-dbg
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519_hcloud_test
    kernel_git_repo_url: "{{ hx_repos[hx_repo].url | default('') }}"
    kernel_git_version: "{{ hx_repos[hx_repo].ver | default('') }}"
    git_environment: "{{ hx_repos[hx_repo].tok | default({}) }}"
    kernel_debian_backports: "{{ hx_parts[4] | default('') == 'bp' }}"
    kernel_debian_cloud: "{{ hx_parts[5] | default('') == 'cl' }}"
  children:
    hb:
    hi:
    hm:
    hp:
    hr:
    hs:

# Image
hix:
  vars:
    snapshot_description: "{{ inventory_hostname | regex_replace('^hi-', '') | regex_replace('-[0-9]+$', '') }}"
  children:
    hi:

# Misc
hmx:
  vars:
    additional_ports:
      # - 80
      - 443
      # - 2049
    # additional_software:
    #   - nfs-common
    #   - nfs-kernel-server
    kernel_debian_backports: true
    kernel_debian_cloud: true
    # hx_repo: "stable"
    nginx_site_directories:
      - dir: site01
        port: 1234
      - dir: site02
        port: 5678
        secret: "{{ hmx_sec23 }}"
  children:
    hm:

# Snowflake
hsx:
  children:
    hs:

# Tor public bridge
hbx:
  children:
    hb:

# Tor private bridge
hpx:
  children:
    hp:

# Tor server
hrx:
  vars:
    # Exit:
    # additional_software:
    #   - dns-root-data
    #   - unbound
    tor_bridge_distribution: ""
  children:
    hr:

# Tor
htx:
  vars:
    _torrc_config:
      - name: Nickname
        value: "gnampfx{{ ((seed_address + seed_host) | md5)[0:12] }}"
      - name: RelayBandwidthRate
        value: 8 MB
      - name: RelayBandwidthBurst
        value: 24 MB
      - name: PublishServerDescriptor
        value: 0
  children:
    hbx:
    hpx:
    hrx:
